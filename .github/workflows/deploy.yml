name: Build and Deploy CV

on:
  push:
    branches:
      - main  # trigger workflow on pushes to main branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Pandoc and LaTeX (for PDF generation)
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc texlive-xetex texlive-fonts-extra
        
    - name: Convert Markdown to HTML
      run: pandoc cv.md -o build/index.html --template=template.html --metadata-file=metadata.yaml
    
    - name: Convert Markdown to PDF
      run: pandoc cv.md -o build/cv.pdf --template=template.tex --metadata-file=metadata.yaml --pdf-engine=xelatex
      
    - name: Copy styles
      run: cp -r styles build/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build

    - name: Upload PDF as artifact (optional)
      uses: actions/upload-artifact@v5
      with:
        name: cv-pdf
        path: build/pdf/cv.pdf
