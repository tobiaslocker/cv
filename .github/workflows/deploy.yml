name: Build and Deploy CV

on:
  push:
    branches:
      - main  # trigger workflow on pushes to main branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Pandoc
      run: sudo apt-get install -y pandoc texlive-xetex

    - name: Convert Markdown to HTML
      run: |
        mkdir -p build
        pandoc cv.md -o build/index.html --template=template.html
        
    - name: Copy styles
      run: cp -r styles build/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build

  build-pdf:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Convert Markdown to PDF
      run: |
        mkdir -p build/pdf
        pandoc cv.md -o build/pdf/cv.pdf --pdf-engine=xelatex

    - name: Upload PDF as artifact (optional)
      uses: actions/upload-artifact@v3
      with:
        name: cv-pdf
        path: build/pdf/cv.pdf
